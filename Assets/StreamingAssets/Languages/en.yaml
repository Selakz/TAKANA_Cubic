Setting:
  SelectSetting:
    Header: Selection Settings
    TrackSelectedColor: Color when track is selected
  PlayfieldSetting:
    Header: Gameplay Settings
    HitSoundVolumePercent: Hit sound volume percentage (Integer) | Range [0, 100]
    TrackFaceDefaultColor: Default track color; also used to set default track opacity
    MissHoldOpacity: Opacity after missing a Hold | Range [0, 1]
    Speed: Default playback speed | Range [0, 10]
    AudioDeviation: "Audio offset for gameplay (Add if Fast, subtract if Late) | Unit: ms"
    InputDeviation: "Visual offset for gameplay (Add if Fast, subtract if Late) | Unit: ms"
    TrackGap1: Gap between Tap/Hold and track boundaries
    TrackGap2: Gap between Slide and track boundaries
    CameraPosition: Main camera position
    CameraRotation: Main camera rotation
    TimeAfterEnd: "Delay before a missed Note's view is destroyed (Do not modify unless necessary)"
    UpperThreshold: View layer content generates only when Note is below this height at 1x speed (Do not modify unless necessary)
    LowerThreshold: View layer content generates only when Note is above this height at 1x speed (Do not modify unless necessary)
  PerformanceSetting:
    Header: Performance Settings
    UseDebugPanel: Enable debug panel (FPS, etc.)
    UseVSync: Synchronize frame rate with screen refresh rate
    TargetFrameRate: Target frame rate
    ResolutionRatio: Resolution scale
    MergeTrackFace: Merge track textures (loses opacity overlap effect) | Significantly improves performance
    EnableLaneBeam: Enable track hit effects
  TrackLineSetting:
    Header: Track Line Settings
    DefaultEaseId: Default easing ID for curve families | Range [0, 9]
    AllowMultipleEdit: Allow simultaneous editing of track lines on different tracks
    NodePositionNudgeDistance: Distance node moves when clicking A or D
    NodeTimeNudgeDistance: "Time duration node moves when clicking W or S | Unit: ms"
    UneditableLineWidth: Width of track lines when not editable
    EditableLineWidth: Width of track lines when editable
    LeftSideNodeColor: Default color for left track line nodes
    RightSideNodeColor: Default color for right track line nodes
    SelectedLeftColor: Color for selected left track line nodes
    SelectedRightColor: Color for selected right track line nodes
    PosSideNodeColor: Default color for position track line nodes
    WidthSideNodeColor: Default color for width track line nodes
    SelectedPosColor: Color for selected position track line nodes
    SelectedWidthColor: Color for selected width track line nodes
    LogicLinePrecision: Hitbox rendering precision; increase if editing lags
    MaxSegment: Max segments for track lines; decrease if editing lags
    LogicLineWidth: Width of track line hitbox rendering
    AddNodeTimeDistance: "Time interval between a new node and the original when adding via panel | Unit: ms"
  AutoScoreSetting:
    Header: Editor UI Settings
    DummyNoteOpacity: Opacity of dummy Notes | Range [0, 1]
  InScreenEditSetting:
    Header: Editor Settings
    IsInitialTrackLengthToEnd: Make track end time match song end time upon creation
    InitialTrackLength: "Initial track length if the above is false | Unit: ms"
    TimeSnapDistance: "Snapping threshold to the nearest horizontal grid line | Unit: ms"
    NoteNudgeDistance: "Time duration a Note moves when clicking W or S | Unit: ms"
    TimeDragThreshold: "Minimum drag distance required to trigger a drag action | Unit: ms"
    ShowTimeIndicator: Show time indicator
    ShowPositionIndicator: Show position indicator
    WidthGridColor: Vertical grid color
    BeatColor: Grid color for Quarter notes (Beats)
    QuaverColor: Grid color for Eighth notes
    SemiQuaverColor: Grid color for Sixteenth notes
    TripletColor: Grid color for Triplets
    DefaultColor: Default grid color for other cases
  EditorSetting:
    Header: Application Settings
    ScrollSensitivity: Mouse scroll sensitivity (lines per scroll; negative to invert)
    ShouldForcePause: Force pause on left-click during music playback
    AutoSaveInterval: "Auto-save interval | Unit: ms"
    SaveIndented: Indent chart files; disabling this reduces file size
    WindowWidth: Window width (Height calculated automatically to maintain 16:9)
    WindowWidthChoices: Resolution options available in the editor interface
    MouseDragThreshold: "Minimum pixel distance to distinguish a drag from a click | Unit: px"
    RecentProjectBufferCount: Number of recently opened projects to save
    RecentProjects: Recently opened projects
    LastProjectDirectory: Directory of the last created project
    LastCharterId: Last used charter ID
    LastExportDirectory: Last export directory for play packages
  AutoUpdateSetting:
    Header: Auto-update Settings
    CheckUpdateOnStartup: Automatically check for updates on startup | Recommended
    DownloadSilently: Download in background
  TrackLayerSetting:
    Header: Layer Settings
    DefaultLayerId: ID for the default layer
    DefaultLayerName: Default name for the default layer
    ColorDefinitions: Available color definitions for layers
    DefaultColor: Default color used for new layers
    SelectLayerOpacityRatio: Opacity multiplier for selected layers | Range [0, 1]
    UnselectLayerOpacityRatio: Opacity multiplier for unselected layers | Range [0, 1]
  T3ProjSetting:
    MusicFileName: Music file name | Include file extension for the following
    CoverFileName: Cover file name
    SongInfoFileName: Song info file name
    PreferenceFileName: Preference file name (e.g., editor settings)
    ChartFileName: Chart names for each difficulty | Do NOT include file extension
  SongInfo:
    Id: Unique identifier for the song
    Title: Display title
    Composer: Display composer
    Illustrator: Display illustrator
    BpmDisplay: Display BPM info
    Description: Song description
    Difficulties: Info for each difficulty
  DifficultyInfo:
    LevelDisplay: Display difficulty level text
    Charter: Display charter info
  EditorPreference:
    Difficulty: Initial default difficulty | 1 ~ 5 corresponds to Normal ~ Ravage
    Offset: Chart time offset
    MusicVolumePercent: Music volume percentage (Integer) | Range [0, 100]
    Speed: Initial default speed | Range [0, 10]
    TimeGridLineCount: Horizontal time grid density | Range [0, ?)
    WidthGridInterval: Vertical position grid density | Range [0, ?)
    WidthGridOffset: Vertical position grid offset
    BpmList: "BPM list (Key: Time, Value: BPM)"

